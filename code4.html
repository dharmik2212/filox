<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Archive Success</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-lowest": "#ffffff",
                    "tertiary-container": "#f39cfb",
                    "on-secondary": "#f2f1ff",
                    "on-tertiary": "#ffeefb",
                    "primary": "#0058ba",
                    "primary-fixed": "#6c9fff",
                    "surface-container-high": "#dde1ff",
                    "surface-container-highest": "#d5dbff",
                    "on-secondary-fixed": "#00298c",
                    "on-tertiary-fixed-variant": "#6a1f77",
                    "on-error": "#ffefee",
                    "outline-variant": "#a2abd7",
                    "tertiary-fixed": "#f39cfb",
                    "on-background": "#232c51",
                    "surface-dim": "#cad2ff",
                    "surface-variant": "#d5dbff",
                    "on-secondary-container": "#1f3ea2",
                    "on-error-container": "#570008",
                    "tertiary-fixed-dim": "#e48fed",
                    "on-surface": "#232c51",
                    "surface": "#f7f5ff",
                    "inverse-on-surface": "#929bc6",
                    "on-primary-fixed-variant": "#002a60",
                    "on-primary-container": "#00214e",
                    "error-container": "#fb5151",
                    "on-secondary-fixed-variant": "#2b48ac",
                    "on-tertiary-fixed": "#41004d",
                    "background": "#f7f5ff",
                    "on-primary-fixed": "#000000",
                    "primary-dim": "#004da4",
                    "secondary": "#3854b7",
                    "secondary-fixed": "#c6cfff",
                    "tertiary": "#883c93",
                    "error": "#b31b25",
                    "tertiary-dim": "#7a2f86",
                    "on-primary": "#f0f2ff",
                    "inverse-primary": "#4a8eff",
                    "error-dim": "#9f0519",
                    "surface-bright": "#f7f5ff",
                    "surface-tint": "#0058ba",
                    "secondary-fixed-dim": "#b3c1ff",
                    "surface-container": "#e4e7ff",
                    "inverse-surface": "#020a2f",
                    "secondary-dim": "#2a47ab",
                    "secondary-container": "#c6cfff",
                    "outline": "#6c759e",
                    "surface-container-low": "#efefff",
                    "primary-fixed-dim": "#5091ff",
                    "on-surface-variant": "#505a81",
                    "primary-container": "#6c9fff",
                    "on-tertiary-container": "#60136d"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        .font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center overflow-hidden">
<!-- Success Container -->
<main class="w-full max-w-lg px-8 flex flex-col items-center text-center">
<!-- Celebration Graphic (Bento Style Card with Glassmorphism) -->
<div class="relative w-full aspect-square max-w-[320px] mb-12 flex items-center justify-center">
<!-- Background Blob Decoration -->
<div class="absolute inset-0 bg-primary/5 rounded-full blur-3xl scale-110"></div>
<!-- Main Illustration Card -->
<div class="relative z-10 w-full h-full bg-surface-container-lowest rounded-xl flex items-center justify-center overflow-hidden shadow-sunlight-ambient transition-all duration-700 hover:scale-[1.02]">
<div class="absolute inset-0 bg-gradient-to-tr from-primary/10 to-transparent opacity-40"></div>
<!-- Stylized Archive Icon Graphic -->
<div class="flex flex-col items-center gap-6">
<div class="relative">
<div class="absolute -top-4 -right-4 w-12 h-12 bg-tertiary-container rounded-full flex items-center justify-center animate-bounce">
<span class="material-symbols-outlined text-on-tertiary-container text-2xl" data-icon="stars">stars</span>
</div>
<div class="w-32 h-32 bg-primary rounded-xl flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary text-6xl" data-icon="inventory_2" style="font-variation-settings: 'FILL' 1;">inventory_2</span>
</div>
</div>
<div class="space-y-2">
<div class="h-2 w-32 bg-primary-container/30 rounded-full mx-auto"></div>
<div class="h-2 w-20 bg-primary-container/20 rounded-full mx-auto"></div>
</div>
</div>
<!-- Floating Decorative Elements -->
<div class="absolute bottom-8 left-8 w-10 h-10 bg-secondary-container rounded-lg rotate-12 flex items-center justify-center">
<span class="material-symbols-outlined text-secondary text-xl" data-icon="check">check</span>
</div>
<div class="absolute top-12 left-12 w-8 h-8 bg-surface-container-high rounded-full opacity-60"></div>
</div>
</div>
<!-- Content Shell -->
<div class="space-y-4 mb-16">
<h1 class="font-headline text-4xl md:text-5xl font-extrabold tracking-tight text-on-surface">
                Great job!
            </h1>
<p class="text-on-surface-variant text-lg leading-relaxed max-w-sm mx-auto">
                Your items have been safely tucked away in the archive gallery. Everything is exactly where it belongs.
            </p>
</div>
<!-- Action Section -->
<div class="w-full flex flex-col gap-4">
<!-- Primary Action -->
<button class="w-full py-5 rounded-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold text-lg flex items-center justify-center gap-3 shadow-lg active:scale-[0.98] transition-all hover:opacity-90">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
                Return to Dashboard
            </button>
<!-- Secondary Action -->
<button class="w-full py-5 rounded-full bg-surface-container-highest text-primary font-bold text-lg active:scale-[0.98] transition-all hover:bg-surface-container-high">
                View Archive
            </button>
</div>
</main>
<!-- Contextual Status (Hidden on Mobile) -->
<div class="fixed bottom-12 left-12 hidden lg:flex items-center gap-4 p-4 bg-surface-container-lowest/80 backdrop-blur-xl rounded-full px-6 shadow-sm">
<div class="w-2 h-2 bg-primary rounded-full animate-pulse"></div>
<span class="text-sm font-semibold text-on-surface-variant tracking-wide">SYSTEM: SYNC COMPLETE</span>
</div>
<!-- Ornamental Content Card (Top Right) -->
<div class="fixed top-12 right-12 hidden lg:block w-64 bg-surface-container-lowest p-6 rounded-lg shadow-sunlight-ambient rotate-3">
<div class="flex items-start justify-between mb-4">
<div class="w-10 h-10 bg-tertiary/10 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary" data-icon="history">history</span>
</div>
<span class="text-xs font-bold text-on-surface-variant/40">RECENT ACTION</span>
</div>
<div class="space-y-2">
<div class="h-3 w-3/4 bg-surface-container rounded-full"></div>
<div class="h-3 w-1/2 bg-surface-container rounded-full"></div>
</div>
</div>
</body></html>
